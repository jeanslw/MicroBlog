[uwsgi]
# 模块入口
module = wsgi
callable = application

# 项目路径
chdir = /opt/flaskProject
virtualenv = /opt/flaskProject/.venv

# 进程与线程
processes = 4
threads = 2
master = true

# 通信方式（socket 配合 Nginx，http 用于直接访问调试）
socket = /tmp/flask_blog.sock
chmod-socket = 666
# 如果不用 Nginx，改 http 直出：
# http = 0.0.0.0:5000

# 日志
logto = /var/log/uwsgi/flask_blog.log
log-maxsize = 52428800

# 进程管理
pidfile = /tmp/flask_blog.pid
vacuum = true
die-on-term = true

# 请求限制
buffer-size = 65535
harakiri = 60
max-requests = 5000
