{% extends "base.html" %}
{% block title %}修改后台密码 - {{site_name}}{% endblock %}

{% block content %}
<div class="row justify-content-center mt-4">
    <div class="col-md-6">
        <div class="card p-5">
            <h4 class="mb-4 fw-bold"><i class="bi bi-key-fill text-warning"></i> 修改登录密码</h4>
            {% set msgs = get_flashed_messages() %}
            {% if msgs %}
                <div class="alert alert-danger">{{ msgs[0] }}</div>
            {% endif %}
            <form method="POST">
                <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
                <div class="mb-3">
                    <label class="form-label">原密码</label>
                    <input type="password" name="old_pwd" class="form-control form-control-lg" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">新密码</label>
                    <input type="password" name="new_pwd" class="form-control form-control-lg" required>
                </div>
                <div class="mb-4">
                    <label class="form-label">确认新密码</label>
                    <input type="password" name="confirm_pwd" class="form-control form-control-lg" required>
                </div>
                <button class="btn btn-warning w-100 py-2">确认修改</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
